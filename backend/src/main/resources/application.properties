# ============================================================
# Smart Campus EMS - Application Configuration
# ============================================================

server.port=8080
spring.application.name=smart-campus-ems

# ---- MySQL Database ----
spring.datasource.url=jdbc:mysql://localhost:3306/smart_campus_ems?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=your_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ---- JWT ----
app.jwt.secret=SmartCampusEMSSecretKey2025SuperSecureJWTTokenKey!@#$%
app.jwt.expiration=86400000

# ---- Email (OTP) ----
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your_email@gmail.com
spring.mail.password=your_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ---- File Upload ----
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads/

# ---- CORS ----
app.cors.allowed-origins=http://localhost:3000,http://127.0.0.1:5500,http://localhost:5500

# ---- Logging ----
logging.level.com.campus.ems=DEBUG
logging.level.org.springframework.security=WARN
