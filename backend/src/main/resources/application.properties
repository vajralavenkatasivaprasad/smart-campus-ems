server.port=8080
server.servlet.context-path=/api

# DataSource is configured programmatically in DataSourceConfig.java
# using System.getenv() to read Railway's MySQL environment variables:
# MYSQLHOST, MYSQLPORT, MYSQLDATABASE, MYSQLUSER, MYSQLPASSWORD

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

app.jwt.secret=SmartCampusEMSSecretKey2025VeryLongSecretKeyForJWTTokenGeneration
app.jwt.expiration=86400000

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your_email@gmail.com
spring.mail.password=your_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.from=Smart Campus EMS <your_email@gmail.com>

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=./uploads

logging.level.com.campus=DEBUG
logging.level.org.springframework.security=INFO

app.cors.allowed-origins=http://localhost:3000,http://127.0.0.1:5500,http://localhost:5500
app.google.maps.api.key=YOUR_GOOGLE_MAPS_API_KEY
app.otp.expiry-minutes=10
