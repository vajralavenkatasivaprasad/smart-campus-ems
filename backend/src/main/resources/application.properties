# Server
server.port=${PORT:8080}
server.servlet.context-path=/api

# DATABASE - PostgreSQL for Render
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/smart_campus_ems}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT
app.jwt.secret=${JWT_SECRET:SmartCampusEMSSecretKey2025VeryLongSecretKeyForJWTTokenGeneration}
app.jwt.expiration=86400000

# MAIL
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your_email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your_app_password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# CORS
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:8501}

# OTP
app.otp.expiry-minutes=10
